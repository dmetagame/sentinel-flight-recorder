name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test
        env:
          RUN_STDIO_MCP_TESTS: "1"

      - name: Run Sentinel Bench
        run: npm run bench

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-bench-artifacts
          path: evidence/benchmark/
